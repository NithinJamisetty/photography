<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Create Event</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--bg-secondary);">

    <nav class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 40px 0;">
        <a href="index.html" style="text-decoration: none; font-size: 20px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-main);">Capture.</a>
        <a href="index.html" style="text-decoration: none; color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em;">Sign Out</a>
    </nav>

    <main class="container" style="max-width: 800px; padding-top: 40px;">
        <div class="fade-up">
            <h1 class="section-title">New Event.</h1>
            <p style="color: var(--text-muted); margin-bottom: 40px;">Create a private space for your guests to share their perspective.</p>

            <div style="background: white; padding: 60px; border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.03); border: 1px solid var(--border);">
                <form id="createEventForm">
                    <div style="margin-bottom: 30px;">
                        <label style="display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; color: var(--text-muted);">Event Name</label>
                        <input type="text" id="eventName" placeholder="e.g. Sarah & Mark's Wedding" required 
                               style="width: 100%; padding: 20px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-main); font-size: 16px; outline: none;">
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Initialize Event</button>
                </form>

                <div id="eventSuccess" style="display: none; margin-top: 60px; padding-top: 60px; border-top: 1px solid var(--border); text-align: center;">
                    <h2 style="font-size: 24px; margin-bottom: 12px;">Event Created.</h2>
                    <p style="color: var(--text-muted); margin-bottom: 30px;">Your private gallery is ready. Share this QR code or token with your guests.</p>
                    
                    <div id="qrContainer" style="margin-bottom: 30px;">
                        <!-- QR Code will appear here -->
                    </div>

                    <div style="background: var(--bg-secondary); padding: 20px; border-radius: 4px; display: inline-block;">
                        <span style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); display: block; margin-bottom: 8px;">Access Token</span>
                        <strong id="displayToken" style="font-size: 20px; letter-spacing: 0.1em; color: var(--text-main);">-------</strong>
                    </div>

                    <div style="margin-top: 40px;">
                        <a id="goToGallery" href="#" class="btn btn-outline" style="width: 100%;">Go to Live Gallery</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Load Firebase Configuration (Protected) -->
    <script src="config.js"></script>

    <!-- Firebase SDKs (Compat v8) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        try {
            // Initialize Firebase using the global firebaseConfig from config.js
            if (typeof firebaseConfig === 'undefined') {
                throw new Error("Configuration not found. Please ensure config.js exists.");
            }
            
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            console.log("Firebase initialized successfully.");

            const form = document.getElementById('createEventForm');
            const successDiv = document.getElementById('eventSuccess');
            const displayToken = document.getElementById('displayToken');
            const qrContainer = document.getElementById('qrContainer');
            const goToGallery = document.getElementById('goToGallery');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = e.target.querySelector('button');
                submitBtn.innerText = "INITIALIZING...";
                submitBtn.disabled = true;

                const name = document.getElementById('eventName').value;
                const token = Math.random().toString(36).substring(2, 8).toUpperCase();

                try {
                    console.log("Adding event to Firestore...");
                    await db.collection("events").add({
                        name: name,
                        token: token,
                        createdAt: new Date().toISOString()
                    });

                    displayToken.innerText = token;
                    
                    // Robust URL handling for local or hosted use
                    const currentUrl = window.location.href;
                    const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
                    const galleryLink = baseUrl + 'gallery.html?token=' + token;
                    
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(galleryLink)}`;
                    qrContainer.innerHTML = `<img src="${qrUrl}" alt="Event QR Code" style="border: 1px solid var(--border); padding: 10px; border-radius: 4px;">`;

                    goToGallery.href = galleryLink;
                    form.style.display = 'none';
                    successDiv.style.display = 'block';

                } catch (error) {
                    console.error("Critical Error: ", error);
                    alert("FAILED: " + error.message);
                    submitBtn.innerText = "INITIALIZE EVENT";
                    submitBtn.disabled = false;
                }
            });
        } catch (initError) {
            console.error("Firebase Init Failed: ", initError);
            alert("Firebase could not be started. Check your internet connection.");
        }
    </script>
</body>
</html>
