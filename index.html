<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture | Photographer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Minimalist Navigation -->
    <a href="#" class="nav-corner nav-tl brand-logo">CAPTURE.</a>
    <div class="nav-corner nav-tr">
        <a href="#portfolio">PORTFOLIO</a> &middot; 
        <a href="login.html">CLIENT LOGIN</a> &middot; 
        <a href="#about">INFO</a>
    </div>

    <!-- The Grid / Features -->
    <section id="portfolio" class="masonry-grid">
        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=800" alt="Marriage">
            <div class="m-caption">MARRIAGE</div>
        </div>
        
        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?q=80&w=800" alt="Birthday">
            <div class="m-caption">BIRTHDAYS</div>
        </div>
        
        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1527631746610-bca00a040d60?q=80&w=800" alt="Trip">
            <div class="m-caption">TRAVEL</div>
        </div>

        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?q=80&w=800" alt="Group">
            <div class="m-caption">GROUP EVENTS</div>
        </div>

        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=800" alt="Single Portrait">
            <div class="m-caption">PORTRAITS</div>
        </div>

        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=800" alt="Location">
            <div class="m-caption">LOCATIONS</div>
        </div>

        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=800" alt="Occasional">
            <div class="m-caption">SPECIAL OCCASIONS</div>
        </div>

        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?q=80&w=800" alt="Couple">
            <div class="m-caption">COUPLES</div>
        </div>

        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1609220136736-443140cffec6?q=80&w=800" alt="Family">
            <div class="m-caption">FAMILY</div>
        </div>

        <div class="m-item">
            <img src="https://images.unsplash.com/photo-1600093463592-8e36ae95ef56?q=80&w=800" alt="Commercial">
            <div class="m-caption">COMMERCIAL</div>
        </div>
    </section>

    <footer class="footer" id="about">
        <div class="footer-links">
            <a href="#">INSTAGRAM</a>
            <a href="#">TWITTER</a>
            <a href="#">CONTACT</a>
        </div>
        <p>CAPTURE. ALL RIGHTS RESERVED &copy; 2026</p>
    </footer>

    <script>
        // Simple subtle parallax on scroll
        document.addEventListener('scroll', () => {
            const video = document.querySelector('.splash-video');
            if (video && window.scrollY < window.innerHeight) {
                video.style.transform = `translateY(${window.scrollY * 0.3}px)`;
            }
        });
    </script>
</body>
</html>
