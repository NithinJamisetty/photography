<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Capture</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="fade-up" style="background: white; padding: 60px; border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.03); border: 1px solid var(--border); width: 100%; max-width: 450px; text-align: center;">
        <h1 style="font-size: 32px; margin-bottom: 12px;">Welcome Back.</h1>
        <p style="color: var(--text-muted); margin-bottom: 40px;">Sign in to manage your events.</p>
        
        <form>
            <input type="email" placeholder="Email Address" style="width: 100%; padding: 20px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 20px; outline: none;">
            <input type="password" placeholder="Password" style="width: 100%; padding: 20px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 30px; outline: none;">
            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
        </form>
        
        <p style="margin-top: 30px; font-size: 14px; color: var(--text-muted);">Don't have an account? <a href="#" style="color: var(--accent); text-decoration: none; font-weight: 500;">Contact Administrator</a></p>
    </div>
</body>
</html>
