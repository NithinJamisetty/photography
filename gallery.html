<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Capture Moments</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid {
            columns: 3 300px;
            column-gap: 20px;
            width: 100%;
        }
        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            break-inside: avoid;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .gallery-item img {
            width: 100%;
            display: block;
            transition: var(--transition);
        }
        .gallery-item:hover img {
            transform: scale(1.03);
        }
        .upload-btn-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            cursor: pointer;
            border: none;
            z-index: 100;
            transition: var(--transition);
        }
        .upload-btn-float:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        #tokenError {
            display: none;
            text-align: center;
            padding: 100px 0;
        }
    </style>
</head>
<body>

    <nav class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 40px 0;">
        <a href="index.html" style="text-decoration: none; font-size: 20px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-main);">Capture.</a>
        <div id="eventInfo" style="font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">
            <!-- Event name will appear here -->
        </div>
    </nav>

    <main class="container">
        <div id="tokenError">
            <h1 class="section-title">Invalid Access.</h1>
            <p style="color: var(--text-muted); margin-bottom: 40px;">This gallery is private. Please provide a valid token to enter.</p>
            <a href="index.html" class="btn">Return Home</a>
        </div>

        <div id="galleryContent" style="display: none;">
            <div id="galleryGrid" class="gallery-grid">
                <!-- Photos will appear here -->
            </div>
        </div>
    </main>

    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
    <button id="uploadBtn" class="upload-btn-float" style="display: none;">+</button>

    <div id="uploadStatus" style="position: fixed; bottom: 40px; left: 40px; background: white; padding: 15px 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; font-size: 14px; z-index: 200;">
        Uploading... <span id="progressText">0%</span>
    </div>

    <!-- Load Configuration First -->
    <script src="config.js"></script>

    <!-- Firebase SDKs (Compat v8) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <script>
        if (typeof firebaseConfig === 'undefined') {
            alert("Configuration file (config.js) not found.");
        } else {
            // Initialize Firebase
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const storage = firebase.storage();

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const galleryContent = document.getElementById('galleryContent');
            const tokenError = document.getElementById('tokenError');
            const galleryGrid = document.getElementById('galleryGrid');
            const eventInfo = document.getElementById('eventInfo');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInput = document.getElementById('fileInput');

            if (!token) {
                tokenError.style.display = 'block';
            } else {
                verifyToken();
            }

            async function verifyToken() {
                try {
                    const querySnapshot = await db.collection("events").where("token", "==", token).get();

                    if (querySnapshot.empty) {
                        tokenError.style.display = 'block';
                    } else {
                        const eventData = querySnapshot.docs[0].data();
                        eventInfo.innerText = eventData.name;
                        galleryContent.style.display = 'block';
                        uploadBtn.style.display = 'flex';
                        loadPhotos();
                    }
                } catch (err) {
                    console.error("Token verification failed", err);
                    tokenError.style.display = 'block';
                }
            }

            function loadPhotos() {
                db.collection("photos").where("token", "==", token)
                  .onSnapshot((snapshot) => {
                    galleryGrid.innerHTML = '';
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const item = document.createElement('div');
                        item.className = 'gallery-item fade-up';
                        item.innerHTML = `<img src="${data.url}" alt="Event Photo">`;
                        galleryGrid.appendChild(item);
                    });
                });
            }

            uploadBtn.onclick = () => fileInput.click();

            fileInput.onchange = async (e) => {
                const files = e.target.files;
                if (!files.length) return;

                const status = document.getElementById('uploadStatus');
                const progress = document.getElementById('progressText');
                status.style.display = 'block';

                for (let file of files) {
                    const storageRef = storage.ref(`photos/${token}/${Date.now()}_${file.name}`);
                    const uploadTask = storageRef.put(file);

                    uploadTask.on('state_changed', 
                        (snapshot) => {
                            const p = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                            progress.innerText = p + '%';
                        }, 
                        (error) => {
                            console.error("Upload failed", error);
                            alert("Upload failed for " + file.name);
                        }, 
                        async () => {
                            const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                            await db.collection("photos").add({
                                token: token,
                                url: downloadURL,
                                uploadedAt: new Date().toISOString()
                            });
                            status.style.display = 'none';
                        }
                    );
                }
            };
        }
    </script>
</body>
</html>
