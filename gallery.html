<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Capture Moments</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid {
            columns: 3 300px;
            column-gap: 20px;
            width: 100%;
        }
        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            break-inside: avoid;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .gallery-item img {
            width: 100%;
            display: block;
            transition: var(--transition);
        }
        .gallery-item:hover img {
            transform: scale(1.03);
        }
        .upload-btn-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            cursor: pointer;
            border: none;
            z-index: 100;
            transition: var(--transition);
        }
        .upload-btn-float:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        #tokenError {
            display: none;
            text-align: center;
            padding: 100px 0;
        }
    </style>
</head>
<body>

    <nav class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 40px 0;">
        <a href="index.html" style="text-decoration: none; font-size: 20px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-main);">Capture.</a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div id="eventInfo" style="font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">
                <!-- Event name will appear here -->
            </div>
            <button id="downloadAllBtn" class="btn btn-outline" style="padding: 10px 20px; font-size: 10px; display: none;">Download All</button>
        </div>
    </nav>

    <main class="container">
        <div id="tokenError">
            <h1 class="section-title">Invalid Access.</h1>
            <p style="color: var(--text-muted); margin-bottom: 40px;">This gallery is private. Please provide a valid token to enter.</p>
            <a href="index.html" class="btn">Return Home</a>
        </div>

        <div id="galleryContent" style="display: none;">
            <div id="galleryGrid" class="gallery-grid">
                <!-- Photos will appear here -->
            </div>
        </div>
    </main>

    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
    <button id="uploadBtn" class="upload-btn-float" style="display: none;">+</button>

    <div id="uploadStatus" style="position: fixed; bottom: 40px; left: 40px; background: white; padding: 15px 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; font-size: 14px; z-index: 200;">
        Uploading... <span id="progressText">0%</span>
    </div>

    <!-- Load Configuration -->
    <script src="config.js"></script>

    <!-- Supabase SDK (Latest v2) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        let supabaseClient;
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const galleryContent = document.getElementById('galleryContent');
        const tokenError = document.getElementById('tokenError');
        const galleryGrid = document.getElementById('galleryGrid');
        const eventInfo = document.getElementById('eventInfo');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const downloadAllBtn = document.getElementById('downloadAllBtn');

        try {
            // Initialize Supabase
            if (typeof supabaseConfig !== 'undefined' && supabaseConfig.url && supabaseConfig.key) {
                const { createClient } = window.supabase;
                supabaseClient = createClient(supabaseConfig.url, supabaseConfig.key);
                console.log("⚡ Supabase Initialized");
            } else {
                console.warn("Supabase Configuration missing in config.js");
            }

            if (!token) {
                tokenError.style.display = 'block';
            } else if (supabaseClient) {
                verifyToken();
            } else {
                alert("Please update config.js with your Supabase credentials first.");
            }

            async function verifyToken() {
                try {
                    const { data, error } = await supabaseClient
                        .rpc('get_event_by_token', { p_token: token })
                        .single();

                    if (error || !data) {
                        tokenError.style.display = 'block';
                    } else {
                        eventInfo.innerText = data.name;
                        galleryContent.style.display = 'block';
                        uploadBtn.style.display = 'flex';
                        downloadAllBtn.style.display = 'block';
                        loadPhotos();
                        listenForChanges();
                    }
                } catch (err) {
                    console.error("Token verification failed", err);
                    tokenError.style.display = 'block';
                }
            }

            async function loadPhotos() {
                try {
                    const { data, error } = await supabaseClient
                        .rpc('get_photos_by_token', { p_token: token });

                    if (error) throw error;

                    renderPhotos(data);
                } catch (err) {
                    console.error("Photo loading failed", err);
                }
            }

            async function downloadImage(url, filename) {
                try {
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = filename || 'capture-photo.jpg';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(blobUrl);
                } catch (err) {
                    console.error("Download failed", err);
                    // Fallback to opening in new tab if blob fails
                    window.open(url, '_blank');
                }
            }

            function renderPhotos(photos) {
                galleryGrid.innerHTML = '';
                const photoRecords = [];
                photos.forEach((photo) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item fade-up';
                    item.innerHTML = `
                        <img src="${photo.url}" alt="Event Photo">
                        <div style="padding: 15px; background: white; text-align: right;">
                            <button class="download-trigger" data-url="${photo.url}" style="background: none; border: none; font-size: 10px; color: var(--text-muted); cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-main);">Save to Device</button>
                        </div>
                    `;
                    galleryGrid.appendChild(item);
                    photoRecords.push(photo);
                });

                // Attach individual download listeners
                document.querySelectorAll('.download-trigger').forEach(btn => {
                    btn.onclick = (e) => {
                        const url = e.target.getAttribute('data-url');
                        downloadImage(url, `capture_${Date.now()}.jpg`);
                    };
                });

                downloadAllBtn.onclick = async () => {
                    if (photoRecords.length === 0) return;
                    
                    const confirmDown = confirm(`Download all ${photoRecords.length} photos at original quality?`);
                    if (!confirmDown) return;

                    downloadAllBtn.innerText = "Downloading...";
                    downloadAllBtn.disabled = true;

                    for (let i = 0; i < photoRecords.length; i++) {
                        await downloadImage(photoRecords[i].url, `capture_${i+1}.jpg`);
                        // Small delay to prevent browser hitting rate limits or blocking multiple downloads
                        await new Promise(r => setTimeout(r, 500));
                    }

                    downloadAllBtn.innerText = "Download All";
                    downloadAllBtn.disabled = false;
                };
            }

            function listenForChanges() {
                // simple realtime subscription via Broadcast
                supabaseClient
                    .channel(`gallery-${token}`)
                    .on('broadcast', { event: 'new_photo' }, payload => {
                        console.log('New photo broadcast received!');
                        loadPhotos();
                    })
                    .subscribe();
            }

            uploadBtn.onclick = () => fileInput.click();

            fileInput.onchange = async (e) => {
                const files = e.target.files;
                if (!files.length) return;

                const status = document.getElementById('uploadStatus');
                const progress = document.getElementById('progressText');
                status.style.display = 'block';

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    try {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${token}/${Date.now()}_${i}.${fileExt}`;
                        const filePath = fileName;

                        progress.innerText = `Uploading ${i+1}/${files.length}...`;

                        // 1. Upload to Supabase Storage
                        const { data: storageData, error: storageError } = await supabaseClient.storage
                            .from('photos')
                            .upload(filePath, file);

                        if (storageError) throw storageError;

                        // 2. Get Public URL
                        const { data: { publicUrl } } = supabaseClient.storage
                            .from('photos')
                            .getPublicUrl(filePath);

                        // 3. Save metadata to database
                        const { error: dbError } = await supabaseClient
                            .from('photos')
                            .insert([{
                                token: token,
                                url: publicUrl,
                                storage_path: filePath
                            }]);

                        if (dbError) throw dbError;

                        // 4. Notify others via Realtime Broadcast
                        supabaseClient.channel(`gallery-${token}`).send({
                            type: 'broadcast',
                            event: 'new_photo',
                            payload: { filePath }
                        });

                    } catch (uploadErr) {
                        console.error("Upload process error", uploadErr);
                        alert("UPLOAD ERROR: " + uploadErr.message);
                    }
                }
                status.style.display = 'none';
                loadPhotos();
            };
        } catch (err) {
            console.error("System Error:", err);
        }
    </script>
</body>
</html>
